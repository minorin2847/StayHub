services:
  # --- Database Service ---
  db:
    image: postgres:15-alpine
    container_name: stayhub-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: stayhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stayhub-network

  # --- MinIO Service (S3 Compatible Storage) ---
  minio:
    image: minio/minio:latest
    container_name: stayhub-minio
    restart: always
    # Starts the server using /data for storage and exposes the web console
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web Console Port
    environment:
      # Change these credentials for production!
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - ./contents:/data # Persist data to your local ./contents folder
    networks:
      - stayhub-network

  # --- Backend Service (Express) ---
  backend:
    build:
      context: ./Backend/stayhub-be
      dockerfile: Dockerfile
    container_name: stayhub-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - SESSION_KEY=st@yI-IubBNVTHVADu~ng
      - FRONTEND_URL=http://localhost:3000
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=stayhub
      - DB_PORT=5432
      - EMAIL_USER=stayhub.project@gmail.com
      - EMAIL_PASS=whnofpvuvcswsvkw
      # Optional: Add MinIO configs here so your backend can connect
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=password
      - S3_BUCKET_NAME=stayhub-uploads
    volumes:
      - ./Backend/stayhub-be:/app
      - /app/node_modules
    depends_on:
      - db
      - minio # Ensure backend waits for MinIO to start
    networks:
      - stayhub-network

  # --- Frontend Service (Next.js) ---
  frontend:
    build:
      context: ./Frontend/stayhub-fe
      dockerfile: Dockerfile
    container_name: stayhub-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - WATCHPACK_POLLING=true
    volumes:
      - ./Frontend/stayhub-fe:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - stayhub-network

volumes:
  postgres_data:

networks:
  stayhub-network:
    driver: bridge